<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Simples</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
        <div class="column-header">A Fazer</div>
        <div class="tasks"></div>
    </div>
    <div class="column" id="progress" ondrop="drop(event)" ondragover="allowDrop(event)">
        <div class="column-header">Em Progresso</div>
        <div class="tasks"></div>
    </div>
    <div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
        <div class="column-header">Concluído</div>
        <div class="tasks"></div>
    </div>
</div>

<button onclick="openModal()" style="margin: 20px;">Nova Tarefa</button>

<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="float: right; cursor: pointer;">&times;</span>
        <h2>Nova Tarefa</h2>
        <form id="taskForm" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label for="title">Título:</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label for="description">Descrição:</label>
                <textarea id="description"></textarea>
            </div>
            <div class="form-group">
                <label for="dueDate">Data Limite:</label>
                <input type="datetime-local" id="dueDate">
            </div>
            <button type="submit">Salvar</button>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
